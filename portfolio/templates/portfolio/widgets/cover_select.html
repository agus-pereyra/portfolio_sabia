<div id="{{ widget.attrs.id }}" class="cover-select-widget">

  {% for group, options, index in widget.optgroups %}
    {% for option in options %}
      {% include option.template_name with widget=option %}
    {% endfor %}
  {% endfor %}

</div>

<style>
  .cover-select-widget {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 6px;
  }

  /* Tamaño fijo en el label — no en la imagen */
  .cover-option {
    position: relative;
    display: block;
    width: 130px;
    height: 90px;
    cursor: pointer;
    border: 3px solid transparent;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: #eee;
  }
  .cover-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }
  .cover-option:hover {
    border-color: #888;
  }
  .cover-option--selected {
    border-color: #447e9b !important;
    box-shadow: 0 0 0 2px #447e9b44;
  }

  /* Imagen e video llenan el recuadro completamente */
  .cover-thumb {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .cover-video-badge {
    position: absolute;
    bottom: 5px;
    right: 7px;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 1;
  }

  /* Opción "Ninguna" */
  .cover-option--none {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    border: 3px dashed #ccc !important;
  }
  .cover-option--none.cover-option--selected {
    border-color: #447e9b !important;
    background: #eaf3f8;
  }
  .cover-none-label {
    font-size: 12px;
    color: #888;
  }

  /* Fallback cuando no hay thumbnail */
  .cover-no-thumb {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #555;
    padding: 6px;
    text-align: center;
    word-break: break-word;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.cover-select-widget input[type="radio"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        var widget = this.closest('.cover-select-widget');
        widget.querySelectorAll('.cover-option').forEach(function (el) {
          el.classList.remove('cover-option--selected');
        });
        this.closest('.cover-option').classList.add('cover-option--selected');
      });
    });
  });
</script>
